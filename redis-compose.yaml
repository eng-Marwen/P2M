version: "3.8"

services:
  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redis-ui:
    image: redis/redisinsight
    container_name: redis-ui
    ports:
      - "8001:5540"
    depends_on:
      - redis

volumes:
  redis-data:
