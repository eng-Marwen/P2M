name: CI/CD aiMicroservice

on:
  push:
    paths:
      - "aimicroservice/**"
      - ".github/workflows/aimicroservice.yaml"
    branches: [main]
  pull_request:
    paths:
      - "aimicroservice/**"
      - ".github/workflows/aimicroservice.yaml"
    branches: [main]

env:
  SERVICE_NAME: aiMicroservice
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/samsar
jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aimicroservice/prod_dependencies.txt
          pip install pytest

      - name: Run tests
        run: |
          cd aimicroservice
          pytest

  sonarqube:
    needs: run_tests
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  version:
    needs: run_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/version-and-tag.yml
    with:
      service_name: aiMicroservice
    secrets: inherit

  build_image:
    needs: version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build aiMicroservice image
        uses: docker/build-push-action@v5
        with:
          context: ./aimicroservice
          file: ./aimicroservice/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/samsar:aiMicroservice-${{ needs.version.outputs.version }}

      - name: Save image artifact
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/samsar:aiMicroservice-${{ needs.version.outputs.version }} -o aiMicroservice-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiMicroservice-image
          path: aiMicroservice-image.tar

  push_image:
    needs: [build_image, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: aiMicroservice-image

      - name: Load image
        run: |
          docker load -i aiMicroservice-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push aiMicroservice image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/samsar:aiMicroservice-${{ needs.version.outputs.version }}
