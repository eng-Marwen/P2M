version: "1"
services:
  frontend:
    image: frontend:latest 
    ports:
      - 5173:80
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      aimicroservice:
        condition: service_started
    environment:
      API_URL: "http://localhost:4000"
      AI_API_URL: "http://localhost:8000"
      FIREBASE_API_KEY: "AIzaSyDxxlLzE6XtYske4-XYMqFc68Rj_RxAMEE"
  backend:
    image: backend:latest
    ports:
      - 4000:4000
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      aimicroservice:
        condition: service_started
    env_file:
      - ./backend/ENV/.compose.env
  aimicroservice:
    image: aimicroservice:latest 
    ports:
      - 8000:8000
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./aimicroservice/ENV/.compose.env
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    volumes:
      - qdrant_data:/qdrant/storage
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
volumes:
  qdrant_data:
  rabbitmq_data:
  redis_data:
