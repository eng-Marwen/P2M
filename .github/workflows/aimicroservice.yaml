name: CI/CD aiMicroservice

on:
  push:
    paths:
      - "aimicroservice/**"
      - ".github/workflows/aimicroservice.yaml"
    branches: [main]
  pull_request:
    paths:
      - "aimicroservice/**"
      - ".github/workflows/aimicroservice.yaml"
    branches: [main]

env:
  SERVICE_NAME: aiMicroservice
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/samsar
jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aimicroservice/prod_dependencies.txt
          pip install pytest 

      - name: Run tests
        run: |
          cd aimicroservice
          pytest 
  sonarqube:
    needs: run_tests
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}