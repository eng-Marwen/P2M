name: CI/CD Frontend
#event listners to triggers jobs
on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yaml"

    branches: [main]
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yaml"
    branches: [main]
#actions
jobs:
  #job name
  BuilCode:
    #GitHub gives you a temporary VM comes with the most used tools :docker ,node git ... the vm is destroyd after the job end
    runs-on: ubuntu-latest
    #steps run sequentially one step fail --> job stop
    steps:
      #Clones your GitHub repository into the VM its like git clone your-repo
      - name: checkout repo
        uses: actions/checkout@v4 #existen
      #Installs Node.js v18 in the VM
      - name: setup node js
        uses: actions/setup-node@v4
        with:
          node-version: 18

  sonarqube:
    needs: BuilCode
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  version:
    needs: BuilCode
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/version-and-tag.yml
    with:
      service_name: frontend
    secrets: inherit

  build_image:
    runs-on: ubuntu-latest
    needs: version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # CRITICAL: Checkout the code first!
      - name: checkout repo
        uses: actions/checkout@v4

      #prepare docker for building images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build frontend image locally
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}

      - name: Save image artifact
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }} -o frontend-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend-image.tar

  push_image:
    needs: [build_image, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load image
        run: |
          docker load -i frontend-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}

  # trigger_deployment:
  #   needs: [push_image, version]
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Debug version and image
  #       run: |
  #         echo "========================================="
  #         echo "VERSION : ${{ needs.version.outputs.version }}"
  #         echo "IMAGE   : docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}"
  #         echo "========================================="

  #     - name: Deploy to Render
  #       run: |
  #         IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}"

  #         # URL encode the image (replace : with %3A and / with %2F)
  #         ENCODED_IMAGE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$IMAGE', safe=''))")
  #         echo "Encoded image: $ENCODED_IMAGE"

  #         RESPONSE=$(curl -s -X POST \
  #           "${{ secrets.RENDER_DEPLOY_CLIENT_HOOK_URL }}&imgURL=$ENCODED_IMAGE")

  #         echo "Response: $RESPONSE"



  trigger_deployment:
    needs: [push_image, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Debug version and image
        run: |
          echo "========================================="
          echo "VERSION : ${{ needs.version.outputs.version }}"
          echo "IMAGE   : docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}"
          echo "========================================="

      - name: Deploy to Render
        run: |
          IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:frontend-${{ needs.version.outputs.version }}"
          
          ENCODED_IMAGE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$IMAGE', safe=''))")
          echo "Encoded image: $ENCODED_IMAGE"

          RESPONSE=$(curl -s -X POST \
            "${{ secrets.RENDER_DEPLOY_CLIENT_HOOK_URL }}&imgURL=$ENCODED_IMAGE")
          echo "Response: $RESPONSE"

# Push to main
#    ↓
# Checkout code
#    ↓
# Install dependencies
#    ↓
# Run Jest tests
#    ↓
# Tests pass?
#    ├── NO → Stop
#    └── YES
#          ↓
#      Build Docker image
#          ↓
#      Push image to Docker Hub
#          ↓
#      Deploy on render
#

# B. Continuous Integration (CI) — Testing & Validation

# Ensure the code works and is high quality before deployment.

# Common steps:

# Checkout code (clone the repo)

# Set up environment (Node.js, Python, Java, etc.)

# Install dependencies

# Run tests (unit, integration, end-to-end)

# Optional:

# Linting / code formatting check

# Static type checks (TypeScript)

# Security audit (npm audit)

# Test coverage check

# ✅ Goal: catch issues early.

# C. Continuous Delivery / Deployment (CD) — Build & Deploy

# Get the code live automatically if CI passes.

# Common steps:

# Build artifacts (Docker image, binary, zip, etc.)

# Tag version (semantic version + commit SHA)

# Push artifact (Docker registry, package manager)

# Deploy to target environment:

# Cloud service (Render, Railway, Fly.io)

# Kubernetes cluster

# Serverless platform
