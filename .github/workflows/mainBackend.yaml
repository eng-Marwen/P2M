name: CI/CD mainBackend

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/mainBackend.yaml"
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/mainBackend.yaml"
    branches: [main]

env:
  SERVICE_NAME: backend
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/samsar

jobs:

  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test
          # 5. Run SonarCloud analysis

  sonarqube:
    needs: run_tests
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  version:
    needs: run_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/version-and-tag.yml
    with:
      service_name: backend
    secrets: inherit

  build_image:
    needs: version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/samsar:backend-${{ needs.version.outputs.version }}

      - name: Save image artifact
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/samsar:backend-${{ needs.version.outputs.version }} -o backend-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar

  push_image:
    needs: [build_image, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load image
        run: |
          docker load -i backend-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/samsar:backend-${{ needs.version.outputs.version }}
 
  trigger_deployment:
    needs: [push_image, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Debug version and image
        run: |
          echo "========================================="
          echo "VERSION FROM version job : ${{ needs.version.outputs.version }}"
          echo "IMAGE FULL URL           : docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:backend-${{ needs.version.outputs.version }}"
          echo "RENDER SERVICE ID        : ${{ secrets.RENDER_SERVICE_ID }}"
                echo "========================================="
      - name: Deploy to Render
        run: |
          IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/samsar:backend-${{ needs.version.outputs.version }}"
          echo "Deploying image: $IMAGE"

          # Step 1: Update the service to point to the new image
          UPDATE=$(curl -s -X PATCH https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }} \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -d "{\"image\": {\"url\": \"$IMAGE\"}}")

          echo "Update response:"
          echo $UPDATE | jq .

          # Step 2: Trigger the deploy
          RESPONSE=$(curl -s -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -d '{}')

          echo "========================================="
          echo "Render API Response:"
          echo $RESPONSE | jq .
          echo "Deployed image ref : $(echo $RESPONSE | jq -r '.image.ref')"
          echo "Deploy status      : $(echo $RESPONSE | jq -r '.status')"
          echo "========================================="

# Push to main
#    ↓
# Checkout code
#    ↓
# Install dependencies
#    ↓
# Run Jest tests
#    ↓
# Tests pass?
#    ├── NO → Stop
#    └── YES
#          ↓
#      Build Docker image
#          ↓
#      Push image to Docker Hub
#          ↓
#      Deploy on render
#

# B. Continuous Integration (CI) — Testing & Validation

# Ensure the code works and is high quality before deployment.

# Common steps:

# Checkout code (clone the repo)

# Set up environment (Node.js, Python, Java, etc.)

# Install dependencies

# Run tests (unit, integration, end-to-end)

# Optional:

# Linting / code formatting check

# Static type checks (TypeScript)

# Security audit (npm audit)

# Test coverage check

# ✅ Goal: catch issues early.

# C. Continuous Delivery / Deployment (CD) — Build & Deploy

# Get the code live automatically if CI passes.

# Common steps:

# Build artifacts (Docker image, binary, zip, etc.)

# Tag version (semantic version + commit SHA)

# Push artifact (Docker registry, package manager)

# Deploy to target environment:

# Cloud service (Render, Railway, Fly.io)

# Kubernetes cluster

# Serverless platform
