services:
  aimicroservice:
    image: ai_mic:latest
    ports:
      - 8000:8000
    env_file:
      - ./aimicroservice/.env
    environment:
      RABBITMQ_HOST: rabbitmq:5672
      QDRANT_URL: http://qdrant:6333
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    volumes:
      - qdrant_data:/qdrant/storage
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
volumes:
  qdrant_data:
  rabbitmq_data:
