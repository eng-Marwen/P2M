version: "1"
services:
  backend:
    image: backend:latest
    ports:
      - 4000:4000
    env_file:
      - ./backend/ENV/.compose.env
    depends_on:
      - rabbitmq
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  rabbitmq_data:
  redis_data:
